name: Deploy Travelogue to AWS EB

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create ZIP deployment package
        # Zips the Django app AND includes the SQLite database
        run: |
          zip -r ../deploy.zip . -x "*/__pycache__/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: travelogue
          environment_name: travelogue-env  # Make sure this matches your active AWS environment!
          version_label: "travelogue-${{ github.sha }}"
          region: us-east-1
          deployment_package: deploy.zip