name: Deploy Travelogue to AWS EB

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1: TEST & SONARCLOUD (Runs in parallel)
  # ==========================================
  test_and_scan:
    name: Unit Tests & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run Core Flow Tests
        run: |
          pip install -r requirements.txt
          pip install coverage
          coverage run --source='journeys' manage.py test
          coverage xml
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # JOB 2: DEPLOY TO AWS (Runs in parallel)
  # ==========================================
  deploy:
    name: Build & Deploy to EB
    runs-on: ubuntu-latest
    
    # 🚨 DEVSECOPS NOTE: 
    # If you want to prevent broken code from deploying to AWS, 
    # uncomment the line below so this job waits for tests to pass first!
    # needs: test_and_scan 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP deployment package
        run: |
          zip -r deploy.zip . -x "venv/*" "*.git*" ".github*" "__pycache__/*" "*.pyc" "*.sqlite3" ".scannerwork/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: travelogue
          environment_name: travelogue-env-01
          version_label: "travelogue-${{ github.sha }}"
          region: us-east-1 
          deployment_package: deploy.zip

  # ==========================================
  # JOB 3: DYNAMIC SECURITY SCAN (DAST)
  # ==========================================
  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: deploy  # <--- MUST wait for AWS to finish deploying before scanning
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bulletproof permissions for ZAP
        run: |
          touch zap.yaml
          chmod 777 zap.yaml
          chmod -R 777 ${{ github.workspace }}

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'https://travelogue.anuragktech.me/'
          fail_action: false

      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Security-Report
          path: report_html.html